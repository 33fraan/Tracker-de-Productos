<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fortis — Tracker de Productos</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f7; color: #1d1d1f; font-size: 14px; }

  /* Header */
  .header { background: #1d1d1f; color: white; padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; }
  .header-title { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
  .header-sub { font-size: 12px; color: #888; margin-top: 2px; }
  .btn-add { background: #30d158; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-add:hover { background: #25a244; }

  /* Stats */
  .stats { display: flex; gap: 12px; padding: 16px 24px; background: #fff; border-bottom: 1px solid #e5e5e7; }
  .stat { flex: 1; }
  .stat-val { font-size: 22px; font-weight: 700; }
  .stat-label { font-size: 11px; color: #888; margin-top: 2px; }

  /* Filters */
  .filters { padding: 12px 24px; display: flex; gap: 10px; align-items: center; background: #f5f5f7; flex-wrap: wrap; }
  .filter-select, .filter-input { border: 1px solid #d2d2d7; border-radius: 8px; padding: 6px 10px; font-size: 13px; background: #fff; color: #1d1d1f; }
  .btn-export { margin-left: auto; background: #fff; border: 1px solid #d2d2d7; border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer; color: #1d1d1f; }
  .btn-export:hover { background: #f0f0f0; }

  /* Table */
  .table-wrap { overflow-x: auto; padding: 0 24px 24px; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-top: 12px; }
  th { background: #f5f5f7; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #888; padding: 10px 12px; text-align: left; white-space: nowrap; }
  td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }

  /* Badges */
  .badge { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .badge-green { background: #d1f5dc; color: #1a7a35; }
  .badge-yellow { background: #fff3cd; color: #856404; }
  .badge-red { background: #fde8e8; color: #991b1b; }
  .badge-gray { background: #e8e8e8; color: #555; }
  .badge-blue { background: #dbeafe; color: #1e40af; }
  .badge-purple { background: #ede9fe; color: #5b21b6; }
  .badge-orange { background: #ffedd5; color: #9a3412; }

  /* Margin pill */
  .margin-pill { font-weight: 700; font-size: 13px; }
  .margin-hi { color: #1a7a35; }
  .margin-mid { color: #856404; }
  .margin-lo { color: #991b1b; }

  /* Actions */
  .actions { display: flex; gap: 6px; }
  .btn-sm { border: none; border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer; font-weight: 500; }
  .btn-edit { background: #e8f0fe; color: #1a56db; }
  .btn-edit:hover { background: #c7d7fe; }
  .btn-del { background: #fde8e8; color: #991b1b; }
  .btn-del:hover { background: #fcc; }

  /* Product name */
  .product-name { font-weight: 600; font-size: 13px; max-width: 180px; }
  .product-cat { font-size: 11px; color: #888; margin-top: 1px; }

  /* Proveedor */
  .proveedor { font-size: 12px; color: #555; }
  .proveedor-web { font-size: 11px; color: #1a56db; }

  /* Modal */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 100; align-items: center; justify-content: center; }
  .overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 16px; padding: 24px; width: 560px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 12px; font-weight: 600; color: #555; }
  input, select, textarea { border: 1px solid #d2d2d7; border-radius: 8px; padding: 8px 10px; font-size: 13px; color: #1d1d1f; width: 100%; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: #1a56db; }
  textarea { resize: vertical; min-height: 60px; }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .btn-primary { background: #1d1d1f; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-secondary { background: #f0f0f0; color: #1d1d1f; border: none; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .margin-preview { background: #f5f5f7; border-radius: 8px; padding: 10px 14px; margin-top: 10px; font-size: 13px; }
  .margin-preview span { font-weight: 700; }

  .empty { text-align: center; color: #888; padding: 48px; font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">⚡ Fortis — Tracker de Productos</div>
    <div class="header-sub">Análisis de márgenes y oportunidades para ML Argentina</div>
  </div>
  <button class="btn-add" onclick="openModal()">+ Agregar producto</button>
</div>

<div class="stats" id="stats"></div>

<div class="filters">
  <input class="filter-input" type="text" placeholder="Buscar producto..." oninput="render()" id="fSearch">
  <select class="filter-select" onchange="render()" id="fCat">
    <option value="">Todas las categorías</option>
    <option>Suplementación</option>
    <option>Skincare</option>
    <option>Químicos</option>
  </select>
  <select class="filter-select" onchange="render()" id="fStatus">
    <option value="">Todos los estados</option>
    <option>Analizar</option>
    <option>Testear</option>
    <option>Activo</option>
    <option>Descartado</option>
  </select>
  <select class="filter-select" onchange="render()" id="fAnmat">
    <option value="">ANMAT — todos</option>
    <option>Sí</option>
    <option>No</option>
    <option>Zona gris</option>
  </select>
  <button class="btn-export" onclick="exportCSV()">⬇ Exportar CSV</button>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Producto</th>
        <th>Proveedor</th>
        <th>$ Mayor</th>
        <th>MOQ</th>
        <th>$ ML</th>
        <th>Comisión</th>
        <th>Margen</th>
        <th>Competencia</th>
        <th>ANMAT</th>
        <th>Estado</th>
        <th>Notas</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Nuevo producto</div>
    <div class="form-grid">
      <div class="form-group full">
        <label>NOMBRE DEL PRODUCTO</label>
        <input type="text" id="fNombre" placeholder="Ej: Melena de León Doble Extracto 60ml">
      </div>
      <div class="form-group">
        <label>CATEGORÍA</label>
        <select id="fCategoria">
          <option>Suplementación</option>
          <option>Skincare</option>
          <option>Químicos</option>
        </select>
      </div>
      <div class="form-group">
        <label>ESTADO</label>
        <select id="fEstado">
          <option>Analizar</option>
          <option>Testear</option>
          <option>Activo</option>
          <option>Descartado</option>
        </select>
      </div>
      <div class="form-group">
        <label>PROVEEDOR</label>
        <input type="text" id="fProveedor" placeholder="Ej: Fungiteca">
      </div>
      <div class="form-group">
        <label>WEB PROVEEDOR</label>
        <input type="text" id="fWeb" placeholder="Ej: fungiteca.com.ar">
      </div>
      <div class="form-group">
        <label>PRECIO MAYORISTA (ARS)</label>
        <input type="number" id="fMayor" placeholder="14000" oninput="calcMargin()">
      </div>
      <div class="form-group">
        <label>MOQ (unidades mínimas)</label>
        <input type="number" id="fMoq" placeholder="4">
      </div>
      <div class="form-group">
        <label>PRECIO ML ESTIMADO (ARS)</label>
        <input type="number" id="fMl" placeholder="30000" oninput="calcMargin()">
      </div>
      <div class="form-group">
        <label>COMISIÓN ML (%)</label>
        <input type="number" id="fComision" value="17" oninput="calcMargin()">
      </div>
      <div class="form-group">
        <label>COMPETENCIA EN ML</label>
        <select id="fCompetencia">
          <option>Baja</option>
          <option>Media</option>
          <option>Alta</option>
        </select>
      </div>
      <div class="form-group">
        <label>ANMAT</label>
        <select id="fAnmatP">
          <option>Sí</option>
          <option>No</option>
          <option>Zona gris</option>
        </select>
      </div>
      <div class="form-group full">
        <div class="margin-preview" id="marginPreview">Completá precio mayor y precio ML para ver el margen.</div>
      </div>
      <div class="form-group full">
        <label>NOTAS</label>
        <textarea id="fNotas" placeholder="Observaciones, contacto del proveedor, riesgos, oportunidades..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveProduct()">Guardar</button>
    </div>
  </div>
</div>

<script>
// ─── DATA ─────────────────────────────────────────────────────────────────────
let products = [
  { id: 1, nombre: "Melena de León Extracto 60ml", categoria: "Suplementación", proveedor: "Fungiteca", web: "fungiteca.com.ar", mayor: 14000, moq: 4, ml: 30000, comision: 17, competencia: "Baja", anmat: "Sí", estado: "Analizar", notas: "Hero product. Ángulo: memoria y foco. Pack x2 recomendado para ML. ANMAT vigente. Compra mínima 32 goteros totales ($448k)." },
  { id: 2, nombre: "Pack x2 Melena de León 60ml", categoria: "Suplementación", proveedor: "Fungiteca", web: "fungiteca.com.ar", mayor: 28000, moq: 2, ml: 58000, comision: 17, competencia: "Baja", anmat: "Sí", estado: "Analizar", notas: "Combo recomendado. 2 meses de suministro. Diferencial vs competidores que sólo venden suelto. Menor competencia directa." },
  { id: 3, nombre: "Reishi Extracto 60ml", categoria: "Suplementación", proveedor: "Fungiteca", web: "fungiteca.com.ar", mayor: 14000, moq: 4, ml: 27000, comision: 17, competencia: "Media", anmat: "Sí", estado: "Analizar", notas: "Ángulo: inmunidad y estrés crónico. Mercado más maduro que Melena. Considerar combo Reishi + Ashwagandha." },
  { id: 4, nombre: "Cordyceps Extracto 60ml", categoria: "Suplementación", proveedor: "Fungiteca", web: "fungiteca.com.ar", mayor: 14000, moq: 4, ml: 27000, comision: 17, competencia: "Media", anmat: "Sí", estado: "Analizar", notas: "Ángulo: energía y rendimiento físico. Crece en comunidad fitness. Buen complemento de whey/creatina." },
  { id: 5, nombre: "Ashwagandha Extracto 60ml", categoria: "Suplementación", proveedor: "Fungiteca", web: "fungiteca.com.ar", mayor: 14000, moq: 4, ml: 26000, comision: 17, competencia: "Alta", anmat: "Sí", estado: "Analizar", notas: "Mucha competencia en cápsulas pero menos en extracto líquido. Diferencial: biodisponibilidad del líquido." },
  { id: 6, nombre: "Shiitake Extracto 60ml", categoria: "Suplementación", proveedor: "Fungiteca", web: "fungiteca.com.ar", mayor: 14000, moq: 4, ml: 24000, comision: 17, competencia: "Baja", anmat: "Sí", estado: "Analizar", notas: "Menos demanda individual. Mejor en combo (ej: pack inmunidad con Reishi + Cola de Pavo)." },
  { id: 7, nombre: "Cola de Pavo Extracto 60ml", categoria: "Suplementación", proveedor: "Fungiteca", web: "fungiteca.com.ar", mayor: 14000, moq: 4, ml: 24000, comision: 17, competencia: "Baja", anmat: "Sí", estado: "Analizar", notas: "Turkey Tail. Muy asociado a oncología integrativa. Nicho específico pero comprador comprometido." },
  { id: 8, nombre: "Tremella Extracto 60ml", categoria: "Suplementación", proveedor: "Fungiteca", web: "fungiteca.com.ar", mayor: 14000, moq: 4, ml: 26000, comision: 17, competencia: "Baja", anmat: "Sí", estado: "Analizar", notas: "Hidratación de piel — cruce con skincare. Potencial en ángulo beauty-wellness." },
  { id: 9, nombre: "Rhodiola Extracto 60ml", categoria: "Suplementación", proveedor: "Fungiteca", web: "fungiteca.com.ar", mayor: 14000, moq: 4, ml: 26000, comision: 17, competencia: "Baja", anmat: "Sí", estado: "Analizar", notas: "Menos conocido en AR = menor demanda pero también menos competencia. Ángulo: estrés y rendimiento cognitivo." },
  { id: 10, nombre: "Bisglicinato Magnesio + B6 60 caps", categoria: "Suplementación", proveedor: "The Protein Lab", web: "theproteinlab.com.ar", mayor: 12599, moq: 1, ml: 16999, comision: 17, competencia: "Alta", anmat: "No", estado: "Descartado", notas: "DESCARTADO. El proveedor vende en ML al mismo precio techo. Margen real ~12%. No viable." },
  { id: 11, nombre: "Serum Péptidos K-Beauty (PDRN)", categoria: "Skincare", proveedor: "A confirmar", web: "", mayor: 30000, moq: 0, ml: 70000, comision: 17, competencia: "Media", anmat: "No", estado: "Analizar", notas: "Tendencia viral TikTok 2026. Marcas: Medicube, TIRTIR. Sin ANMAT (cosmético tópico). Proveedores: Kosméticos.ar, KBeauty Argentina. Validar stock consistente antes de escalar." },
  { id: 12, nombre: "Matcha Serum / Crema K-Beauty", categoria: "Skincare", proveedor: "A confirmar", web: "kosmeticos.com.ar", mayor: 28000, moq: 0, ml: 65000, comision: 17, competencia: "Baja", anmat: "No", estado: "Analizar", notas: "Incipiente en ML AR (<10 listings). TIRTIR matcha PDRN trending EU/USA. Mayor upside pero validar stock y consistencia de proveedor." },
  { id: 13, nombre: "Colágeno Gomitas Premium (importado)", categoria: "Suplementación", proveedor: "A confirmar", web: "", mayor: 35000, moq: 0, ml: 80000, comision: 17, competencia: "Media", anmat: "No", estado: "Analizar", notas: "Segmento dominado por Arcor/Bagó en low-price. Oportunidad en versión premium importada con biotin + HA + vitamina C. Proveedores: Gennuine, EPN Store." }
];
let editId = null;
let nextId = 20;

// ─── CALC ─────────────────────────────────────────────────────────────────────
function calcNetMargin(mayor, ml, comision) {
  if (!mayor || !ml || mayor <= 0 || ml <= 0) return null;
  const com = ml * (comision / 100);
  const ganancia = ml - mayor - com;
  return Math.round((ganancia / mayor) * 100);
}

function calcMargin() {
  const mayor = parseFloat(document.getElementById('fMayor').value) || 0;
  const ml = parseFloat(document.getElementById('fMl').value) || 0;
  const com = parseFloat(document.getElementById('fComision').value) || 17;
  const prev = document.getElementById('marginPreview');
  if (!mayor || !ml) { prev.innerHTML = 'Completá precio mayor y precio ML para ver el margen.'; return; }
  const comARS = ml * (com / 100);
  const ganancia = ml - mayor - comARS;
  const margen = Math.round((ganancia / mayor) * 100);
  const color = margen >= 30 ? '#1a7a35' : margen >= 15 ? '#856404' : '#991b1b';
  const inv = Math.round((mayor * (document.getElementById('fMoq').value || 1)));
  prev.innerHTML = `Ganancia por unidad: <span style="color:${color}">$${Math.round(ganancia).toLocaleString('es-AR')} ARS</span> &nbsp;|&nbsp; Margen: <span style="color:${color}">${margen}%</span> &nbsp;|&nbsp; Comisión ML: $${Math.round(comARS).toLocaleString('es-AR')} &nbsp;|&nbsp; Inversión MOQ: $${inv.toLocaleString('es-AR')}`;
}

// ─── BADGES ──────────────────────────────────────────────────────────────────
function statusBadge(s) {
  const map = { 'Activo': 'badge-green', 'Testear': 'badge-blue', 'Analizar': 'badge-yellow', 'Descartado': 'badge-red' };
  return `<span class="badge ${map[s]||'badge-gray'}">${s}</span>`;
}
function compBadge(c) {
  const map = { 'Baja': 'badge-green', 'Media': 'badge-yellow', 'Alta': 'badge-red' };
  return `<span class="badge ${map[c]||'badge-gray'}">${c}</span>`;
}
function anmatBadge(a) {
  const map = { 'Sí': 'badge-green', 'No': 'badge-gray', 'Zona gris': 'badge-orange' };
  return `<span class="badge ${map[a]||'badge-gray'}">${a}</span>`;
}
function catBadge(c) {
  const map = { 'Suplementación': 'badge-purple', 'Skincare': 'badge-blue', 'Químicos': 'badge-orange' };
  return `<span class="badge ${map[c]||'badge-gray'}" style="font-size:10px">${c}</span>`;
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  const search = document.getElementById('fSearch').value.toLowerCase();
  const cat = document.getElementById('fCat').value;
  const status = document.getElementById('fStatus').value;
  const anmat = document.getElementById('fAnmat').value;

  let filtered = products.filter(p => {
    if (search && !p.nombre.toLowerCase().includes(search) && !p.proveedor.toLowerCase().includes(search)) return false;
    if (cat && p.categoria !== cat) return false;
    if (status && p.estado !== status) return false;
    if (anmat && p.anmat !== anmat) return false;
    return true;
  });

  const tbody = document.getElementById('tbody');
  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="12" class="empty">No hay productos que coincidan.</td></tr>`;
  } else {
    tbody.innerHTML = filtered.map(p => {
      const m = calcNetMargin(p.mayor, p.ml, p.comision);
      const mClass = m === null ? '' : m >= 30 ? 'margin-hi' : m >= 15 ? 'margin-mid' : 'margin-lo';
      const mText = m === null ? '—' : `${m}%`;
      const gan = (p.ml && p.mayor) ? Math.round(p.ml - p.mayor - p.ml * (p.comision/100)) : null;
      const comARS = (p.ml && p.comision) ? Math.round(p.ml * (p.comision/100)) : null;
      return `<tr>
        <td>
          <div class="product-name">${p.nombre}</div>
          <div style="margin-top:3px">${catBadge(p.categoria)}</div>
        </td>
        <td>
          <div class="proveedor">${p.proveedor}</div>
          ${p.web ? `<div class="proveedor-web">${p.web}</div>` : ''}
        </td>
        <td>${p.mayor ? '$' + p.mayor.toLocaleString('es-AR') : '—'}</td>
        <td>${p.moq ? p.moq + ' u.' : '—'}</td>
        <td>${p.ml ? '$' + p.ml.toLocaleString('es-AR') : '—'}</td>
        <td>${comARS ? '$' + comARS.toLocaleString('es-AR') : '—'}</td>
        <td>
          <div class="margin-pill ${mClass}">${mText}</div>
          ${gan !== null ? `<div style="font-size:11px;color:#888;margin-top:1px">$${gan.toLocaleString('es-AR')}/u</div>` : ''}
        </td>
        <td>${compBadge(p.competencia)}</td>
        <td>${anmatBadge(p.anmat)}</td>
        <td>${statusBadge(p.estado)}</td>
        <td style="max-width:160px;font-size:11px;color:#555;line-height:1.4">${p.notas ? p.notas.substring(0,80) + (p.notas.length > 80 ? '…' : '') : ''}</td>
        <td>
          <div class="actions">
            <button class="btn-sm btn-edit" onclick="openModal(${p.id})">Editar</button>
            <button class="btn-sm btn-del" onclick="deleteProduct(${p.id})">✕</button>
          </div>
        </td>
      </tr>`;
    }).join('');
  }

  // Stats
  const active = products.filter(p => p.estado !== 'Descartado');
  const margins = active.filter(p => p.mayor && p.ml).map(p => calcNetMargin(p.mayor, p.ml, p.comision));
  const avgMargin = margins.length ? Math.round(margins.reduce((a,b) => a+b, 0) / margins.length) : 0;
  const viable = active.filter(p => calcNetMargin(p.mayor, p.ml, p.comision) >= 30).length;

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-val">${products.length}</div><div class="stat-label">Total productos</div></div>
    <div class="stat"><div class="stat-val" style="color:${avgMargin>=30?'#1a7a35':avgMargin>=15?'#856404':'#991b1b'}">${avgMargin}%</div><div class="stat-label">Margen promedio activos</div></div>
    <div class="stat"><div class="stat-val" style="color:#1a7a35">${viable}</div><div class="stat-label">Productos ≥30% margen</div></div>
    <div class="stat"><div class="stat-val" style="color:#991b1b">${products.filter(p=>p.estado==='Descartado').length}</div><div class="stat-label">Descartados</div></div>
    <div class="stat"><div class="stat-val">${products.filter(p=>p.estado==='Activo').length}</div><div class="stat-label">Activos en ML</div></div>
  `;
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal(id) {
  editId = id || null;
  document.getElementById('modalTitle').textContent = id ? 'Editar producto' : 'Nuevo producto';
  if (id) {
    const p = products.find(x => x.id === id);
    document.getElementById('fNombre').value = p.nombre;
    document.getElementById('fCategoria').value = p.categoria;
    document.getElementById('fEstado').value = p.estado;
    document.getElementById('fProveedor').value = p.proveedor;
    document.getElementById('fWeb').value = p.web || '';
    document.getElementById('fMayor').value = p.mayor || '';
    document.getElementById('fMoq').value = p.moq || '';
    document.getElementById('fMl').value = p.ml || '';
    document.getElementById('fComision').value = p.comision || 17;
    document.getElementById('fCompetencia').value = p.competencia;
    document.getElementById('fAnmatP').value = p.anmat;
    document.getElementById('fNotas').value = p.notas || '';
  } else {
    document.getElementById('fNombre').value = '';
    document.getElementById('fCategoria').value = 'Suplementación';
    document.getElementById('fEstado').value = 'Analizar';
    document.getElementById('fProveedor').value = '';
    document.getElementById('fWeb').value = '';
    document.getElementById('fMayor').value = '';
    document.getElementById('fMoq').value = '';
    document.getElementById('fMl').value = '';
    document.getElementById('fComision').value = 17;
    document.getElementById('fCompetencia').value = 'Media';
    document.getElementById('fAnmatP').value = 'No';
    document.getElementById('fNotas').value = '';
  }
  calcMargin();
  document.getElementById('overlay').classList.add('open');
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }

function saveProduct() {
  const p = {
    nombre: document.getElementById('fNombre').value.trim(),
    categoria: document.getElementById('fCategoria').value,
    estado: document.getElementById('fEstado').value,
    proveedor: document.getElementById('fProveedor').value.trim(),
    web: document.getElementById('fWeb').value.trim(),
    mayor: parseFloat(document.getElementById('fMayor').value) || 0,
    moq: parseInt(document.getElementById('fMoq').value) || 0,
    ml: parseFloat(document.getElementById('fMl').value) || 0,
    comision: parseFloat(document.getElementById('fComision').value) || 17,
    competencia: document.getElementById('fCompetencia').value,
    anmat: document.getElementById('fAnmatP').value,
    notas: document.getElementById('fNotas').value.trim()
  };
  if (!p.nombre) { alert('Ingresá el nombre del producto.'); return; }
  if (editId) {
    const idx = products.findIndex(x => x.id === editId);
    products[idx] = { ...products[idx], ...p };
  } else {
    products.push({ id: nextId++, ...p });
  }
  closeModal();
  render();
}

function deleteProduct(id) {
  if (!confirm('¿Eliminás este producto?')) return;
  products = products.filter(p => p.id !== id);
  render();
}

// ─── EXPORT ──────────────────────────────────────────────────────────────────
function exportCSV() {
  const headers = ['Producto','Categoría','Proveedor','Web','$ Mayor','MOQ','$ ML','Comisión%','Margen%','Ganancia/u','Competencia','ANMAT','Estado','Notas'];
  const rows = products.map(p => {
    const m = calcNetMargin(p.mayor, p.ml, p.comision);
    const gan = (p.ml && p.mayor) ? Math.round(p.ml - p.mayor - p.ml*(p.comision/100)) : '';
    return [p.nombre, p.categoria, p.proveedor, p.web, p.mayor, p.moq, p.ml, p.comision, m||'', gan, p.competencia, p.anmat, p.estado, p.notas].map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(',');
  });
  const csv = [headers.join(','), ...rows].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent('﻿' + csv);
  a.download = 'fortis-productos.csv';
  a.click();
}

document.getElementById('overlay').addEventListener('click', e => { if (e.target === document.getElementById('overlay')) closeModal(); });
render();
</script>
